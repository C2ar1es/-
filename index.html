<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: white;
    overflow: hidden;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
}

.video-box {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

video {
    width: 100vw;
    height: auto;
    max-height: 100vh;
    object-fit: contain;
}

</style>

</head>


<body>

<div class="video-box">

<video autoplay loop muted playsinline>
    <source src="animation.mp4" type="video/mp4">
</video>

</div>

</body>

</html>
