<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#fff;
    overflow:hidden;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

video{
    width:100vw;
    height:auto;
    max-height:100vh;
    display:block;
}

</style>

</head>


<body>

<video 
    id="video"
    autoplay
    loop
    muted
    playsinline
    webkit-playsinline
    x5-video-player-type="h5"
    x5-video-player-fullscreen="false"
    preload="auto">

    <source src="animation.mp4" type="video/mp4">

</video>


<script>

var video=document.getElementById("video");

video.play().catch(function(){
    document.addEventListener("WeixinJSBridgeReady",function(){
        video.play();
    },false);
});

</script>


</body>

</html>
