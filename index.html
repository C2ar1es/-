<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:white;
    overflow:hidden;
}


body{
    display:flex;
    justify-content:center;
    align-items:center;
}


.container{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}


video{
    width:100%;
    max-height:100vh;
    display:none;
}


.play-btn{

    width:120px;
    height:120px;

    border-radius:50%;

    background:#111;

    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:40px;

    cursor:pointer;

}


.text{

    position:absolute;

    margin-top:180px;

    font-size:16px;

    letter-spacing:2px;

    color:#333;

}


</style>

</head>


<body>


<div class="container">


<div id="play" class="play-btn">
▶
</div>


<div id="text" class="text">
CLICK TO VIEW MOTION
</div>


<video id="video" loop muted playsinline>

<source src="animation.mp4" type="video/mp4">

</video>


</div>


<script>


var btn=document.getElementById("play");

var video=document.getElementById("video");

var text=document.getElementById("text");


btn.onclick=function(){

    btn.style.display="none";

    text.style.display="none";

    video.style.display="block";

    video.play();

};


</script>


</body>

</html>
