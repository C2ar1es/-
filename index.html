<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


html,body{

    width:100%;
    height:100%;

    background:#f7f7f5;

}


body{

    display:flex;

    justify-content:center;

    align-items:center;

}


.container{

    display:flex;

    flex-direction:column;

    align-items:center;

    justify-content:center;

}



/* 标题 */

.title{

    font-size:13px;

    letter-spacing:6px;

    color:#888;

    margin-bottom:55px;

}



/* 自定义播放按钮 */

.play{

    width:100px;

    height:100px;

    border-radius:50%;

    border:1px solid #222;

    display:flex;

    justify-content:center;

    align-items:center;

}



/* 三角 */

.play::after{

    content:"";

    margin-left:7px;

    width:0;

    height:0;


    border-top:14px solid transparent;

    border-bottom:14px solid transparent;

    border-left:22px solid #111;

}



/* 下方文字 */

.text{

    margin-top:45px;

    font-size:12px;

    letter-spacing:5px;

    color:#555;

}



.line{

    margin-top:25px;

    width:35px;

    height:1px;

    background:#999;

}



video{

    width:100vw;

    max-height:100vh;

    display:none;

}



</style>

</head>


<body>


<div class="container">


<div class="title">
ROTATION MECHANISM
</div>


<div class="play" id="play"></div>


<div class="text">
START EXPERIENCE
</div>


<div class="line"></div>


<video id="video" loop muted playsinline>

<source src="animation.mp4" type="video/mp4">

</video>


</div>



<script>


var play=document.getElementById("play");

var video=document.getElementById("video");

var container=document.querySelector(".container");


play.onclick=function(){


play.style.display="none";

document.querySelector(".title").style.display="none";

document.querySelector(".text").style.display="none";

document.querySelector(".line").style.display="none";


video.style.display="block";

video.play();


}


</script>


</body>

</html>
