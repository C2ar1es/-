<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


html,body{

    width:100%;
    height:100%;

    background:#f7f7f5;

    overflow:hidden;

    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Helvetica Neue",
    Arial,
    sans-serif;

}


body{

    display:flex;
    justify-content:center;
    align-items:center;

}



.container{

    width:100%;
    height:100%;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

}



/* 产品名称 */

.title{

    font-size:14px;

    letter-spacing:5px;

    color:#777;

    margin-bottom:50px;

}



/* 播放按钮 */

.play{

    width:110px;

    height:110px;

    border-radius:50%;

    border:1px solid #222;

    display:flex;

    justify-content:center;

    align-items:center;

    position:relative;

    cursor:pointer;

    transition:.3s;

}



.play:hover{

    transform:scale(1.05);

}



/* 三角 */

.play span{

    margin-left:6px;

    width:0;

    height:0;

    border-top:14px solid transparent;

    border-bottom:14px solid transparent;

    border-left:22px solid #111;

}



/* 下方文字 */

.text{

    margin-top:45px;

    font-size:12px;

    letter-spacing:4px;

    color:#555;

}



/* 小线 */

.line{

    width:40px;

    height:1px;

    background:#999;

    margin-top:25px;

}



video{

    width:100%;

    max-height:100vh;

    display:none;

}



</style>


</head>



<body>



<div class="container">


<div class="title">

ROTATION MECHANISM

</div>



<div class="play" id="play">

<span></span>

</div>



<div class="text">

START EXPERIENCE

</div>



<div class="line"></div>



<video id="video" loop muted playsinline>

<source src="animation.mp4" type="video/mp4">

</video>



</div>



<script>


var play=document.getElementById("play");

var video=document.getElementById("video");

var title=document.querySelector(".title");

var text=document.querySelector(".text");

var line=document.querySelector(".line");



play.onclick=function(){


play.style.display="none";

title.style.display="none";

text.style.display="none";

line.style.display="none";


video.style.display="block";


video.play();


}



</script>


</body>

</html>
